name: Retrain Model

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: |
          pip install mlflow==2.19.0
          pip install virtualenv

      - name: Run Training via MLflow Project
        run: |
          cd MLProject
          mlflow run . --experiment-name "Intel-Classification-CI"